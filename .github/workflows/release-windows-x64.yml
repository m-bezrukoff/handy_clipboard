name: Release Windows x64 Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build application
        shell: pwsh
        run: .\build.ps1

      - name: Package executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -LiteralPath "build\MaxB Handy Clipboard.exe" -Destination "dist\MaxB Handy Clipboard.exe" -Force
          Compress-Archive -LiteralPath "dist\MaxB Handy Clipboard.exe" -DestinationPath "MaxB-Handy-Clipboard-windows-x64.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaxB-Handy-Clipboard-windows-x64
          path: MaxB-Handy-Clipboard-windows-x64.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: MaxB-Handy-Clipboard-windows-x64.zip
          generate_release_notes: true
