<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f8fb"/>
      <stop offset="1" stop-color="#edf3fa"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="148%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#172033" flood-opacity="0.14"/>
    </filter>
    <style>
      .root { font-family: "Segoe UI", Arial, sans-serif; }
      .h1 { font-size: 32px; font-weight: 700; fill: #0f172a; }
      .h2 { font-size: 22px; font-weight: 700; fill: #0f172a; }
      .h3 { font-size: 16px; font-weight: 700; fill: #0f172a; }
      .body { font-size: 15px; fill: #334155; }
      .small { font-size: 13px; fill: #64748b; }
      .tiny { font-size: 11px; fill: #64748b; }
      .panel { fill: #ffffff; stroke: #d8e1ec; stroke-width: 1; }
      .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; }
      .soft { fill: #f8fbff; stroke: #e2e8f0; stroke-width: 1; }
      .blue { fill: #0b5cad; }
    </style>
  </defs>

  <rect width="1180" height="760" fill="url(#bg)"/>
  <g class="root">
    <text x="56" y="60" class="h1">Theme selector alternatives</text>
    <text x="56" y="88" class="small">Все варианты сохраняют общий layout настроек. Отличаются только способ выбора темы.</text>

    <!-- Option A -->
    <g transform="translate(56 130)" filter="url(#shadow)">
      <rect width="500" height="250" rx="24" class="panel"/>
      <text x="32" y="44" class="h2">A. Two soft option cards</text>
      <text x="32" y="70" class="small">Самый понятный и современный вариант. Хорошо масштабируется.</text>

      <text x="32" y="116" class="body">Тема интерфейса</text>
      <g transform="translate(32 132)">
        <rect x="0" y="0" width="202" height="72" rx="18" fill="#f8fbff" stroke="#93c5fd"/>
        <circle cx="34" cy="36" r="14" fill="#fff" stroke="#bfdbfe"/>
        <circle cx="34" cy="36" r="7" fill="#0b5cad"/>
        <circle cx="70" cy="36" r="14" fill="#fde68a"/>
        <text x="96" y="32" class="h3">Светлая</text>
        <text x="96" y="52" class="tiny">Светлый фон и синий акцент</text>
      </g>
      <g transform="translate(250 132)">
        <rect x="0" y="0" width="202" height="72" rx="18" fill="#fff" stroke="#e2e8f0"/>
        <circle cx="34" cy="36" r="14" fill="#fff" stroke="#cbd5e1"/>
        <path d="M70 24 a14 14 0 1 0 12 22 a18 18 0 1 1 -12 -22" fill="#111827"/>
        <text x="96" y="32" class="h3">Темная</text>
        <text x="96" y="52" class="tiny">Темная палитра окна</text>
      </g>
    </g>

    <!-- Option B -->
    <g transform="translate(624 130)" filter="url(#shadow)">
      <rect width="500" height="250" rx="24" class="panel"/>
      <text x="32" y="44" class="h2">B. Theme switch</text>
      <text x="32" y="70" class="small">Самый компактный. Хорош для маленького окна настроек.</text>

      <rect x="32" y="112" width="436" height="82" rx="18" fill="#fff" stroke="#e2e8f0"/>
      <text x="56" y="146" class="h3">Темная тема</text>
      <text x="56" y="170" class="small">Переключить цветовую схему интерфейса</text>
      <g transform="translate(372 132)">
        <rect x="0" y="0" width="62" height="34" rx="17" fill="#e2e8f0"/>
        <circle cx="17" cy="17" r="13" fill="#fff"/>
      </g>
      <text x="372" y="210" class="tiny">Off state</text>
    </g>

    <!-- Option C -->
    <g transform="translate(56 430)" filter="url(#shadow)">
      <rect width="500" height="250" rx="24" class="panel"/>
      <text x="32" y="44" class="h2">C. Icon pills</text>
      <text x="32" y="70" class="small">Похоже на Windows 11 Settings. Компактно, но выразительно.</text>

      <text x="32" y="116" class="body">Тема интерфейса</text>
      <rect x="32" y="132" width="320" height="48" rx="16" fill="#eef4fb" stroke="#cbd5e1"/>
      <rect x="36" y="136" width="154" height="40" rx="13" fill="#fff" stroke="#d8e1ec"/>
      <circle cx="78" cy="156" r="10" fill="#fde68a"/>
      <text x="104" y="162" font-size="14" font-weight="600" fill="#0f172a">Светлая</text>
      <circle cx="235" cy="156" r="10" fill="#334155"/>
      <circle cx="240" cy="152" r="10" fill="#eef4fb"/>
      <text x="262" y="162" font-size="14" fill="#64748b">Темная</text>
    </g>

    <!-- Option D -->
    <g transform="translate(624 430)" filter="url(#shadow)">
      <rect width="500" height="250" rx="24" class="panel"/>
      <text x="32" y="44" class="h2">D. Dropdown row</text>
      <text x="32" y="70" class="small">Самый спокойный вариант. Меньше визуального шума.</text>

      <rect x="32" y="112" width="436" height="82" rx="18" fill="#fff" stroke="#e2e8f0"/>
      <text x="56" y="146" class="h3">Тема интерфейса</text>
      <text x="56" y="170" class="small">Светлая</text>
      <rect x="330" y="132" width="104" height="34" rx="11" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="362" y="154" font-size="14" fill="#0f172a">Светлая</text>
      <path d="M414 144 l5 5 l5 -5" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <rect x="56" y="704" width="1068" height="1" fill="#d8e1ec"/>
    <text x="56" y="732" class="small">Рекомендация: A, если не жалко места; B, если важна компактность. Для твоего окна настроек я бы выбрал A.</text>
  </g>
</svg>
