<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f8fb"/>
      <stop offset="1" stop-color="#edf3fa"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f7de1"/>
      <stop offset="1" stop-color="#0b5cad"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="148%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#172033" flood-opacity="0.16"/>
    </filter>
    <filter id="softShadow" x="-18%" y="-18%" width="136%" height="148%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#172033" flood-opacity="0.11"/>
    </filter>
    <style>
      .root { font-family: "Segoe UI", Arial, sans-serif; }
      .h1 { font-size: 32px; font-weight: 700; fill: #0f172a; }
      .h2 { font-size: 24px; font-weight: 700; fill: #0f172a; }
      .h3 { font-size: 17px; font-weight: 700; fill: #0f172a; }
      .body { font-size: 16px; fill: #334155; }
      .small { font-size: 13px; fill: #64748b; }
      .tiny { font-size: 11px; fill: #64748b; }
      .caption { font-size: 14px; fill: #475569; }
      .panel { fill: #ffffff; stroke: #d8e1ec; stroke-width: 1; }
      .soft { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
      .line { stroke: #e2e8f0; stroke-width: 1; }
      .button { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .darkH2 { font-size: 24px; font-weight: 700; fill: #f8fafc; }
      .darkH3 { font-size: 17px; font-weight: 700; fill: #f8fafc; }
      .darkBody { font-size: 16px; fill: #e5e7eb; }
      .darkSmall { font-size: 13px; fill: #9ca3af; }
    </style>
  </defs>

  <rect width="1280" height="900" fill="url(#pageBg)"/>
  <g class="root">
    <text x="56" y="58" class="h1">Selected direction v2</text>
    <text x="56" y="86" class="caption">Основа: Fluent Compact. Светлая схема: вариант 01. Темная тема: вариант 02. Шрифты меньше на 1 пункт, отступы записей меньше на 2 px.</text>

    <!-- Light theme -->
    <text x="56" y="138" class="h2">Light theme</text>
    <g transform="translate(56 166)" filter="url(#shadow)">
      <rect x="0" y="0" width="480" height="252" rx="24" class="panel"/>
      <rect x="22" y="20" width="436" height="54" rx="18" fill="#f8fbff"/>
      <text x="40" y="53" class="h2">История буфера</text>
      <rect x="358" y="30" width="72" height="26" rx="13" fill="#e7f1ff"/>
      <text x="394" y="48" text-anchor="middle" font-size="14" fill="#0b5cad">5 / 20</text>
      <text x="40" y="90" class="small">Ctrl+Shift+Win</text>
      <line x1="40" y1="110" x2="438" y2="110" class="line"/>

      <!-- list padding is 2px tighter than v1 -->
      <g transform="translate(32 126)">
        <rect x="0" y="0" width="416" height="50" rx="15" fill="#f7fbff" stroke="#93c5fd"/>
        <rect x="12" y="13" width="30" height="24" rx="12" fill="url(#blue)"/>
        <text x="27" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1</text>
        <text x="56" y="31" class="body">31.56.205.85</text>
      </g>
      <g transform="translate(32 180)">
        <rect x="0" y="0" width="416" height="42" rx="14" fill="#fff" stroke="#e2e8f0"/>
        <rect x="12" y="10" width="30" height="22" rx="11" fill="#e7f1ff"/>
        <text x="27" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#0b5cad">2</text>
        <text x="56" y="27" class="caption">Вставить выбранную запись...</text>
      </g>
    </g>

    <g transform="translate(574 166)" filter="url(#shadow)">
      <rect x="0" y="0" width="500" height="400" rx="24" class="panel"/>
      <rect x="24" y="22" width="452" height="70" rx="18" fill="#f8fbff" stroke="#e2e8f0"/>
      <text x="46" y="54" class="h2">Extended Clipboard</text>
      <text x="46" y="78" class="small">Записей в истории: 5 / 20</text>

      <rect x="24" y="112" width="452" height="124" rx="18" fill="#fff" stroke="#e2e8f0"/>
      <text x="46" y="144" class="h3">Комбинация для истории</text>
      <rect x="46" y="160" width="214" height="38" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="62" y="184" class="body">Ctrl+Shift+Win</text>
      <rect x="278" y="160" width="120" height="38" rx="12" fill="#0b5cad"/>
      <text x="338" y="184" text-anchor="middle" font-size="15" font-weight="600" fill="#fff">Применить</text>
      <text x="46" y="218" class="tiny">ЛКМ по значку: история. ПКМ: настройки.</text>

      <rect x="24" y="256" width="452" height="64" rx="18" fill="#fff" stroke="#e2e8f0"/>
      <rect x="46" y="276" width="22" height="22" rx="6" fill="#0b5cad"/>
      <path d="M51 287 l5 5 l9 -11" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="82" y="293" class="body">Вставлять выбранную запись автоматически</text>

      <rect x="24" y="342" width="136" height="38" rx="12" class="button"/>
      <text x="92" y="366" text-anchor="middle" class="caption">Очистить</text>
      <rect x="178" y="342" width="108" height="38" rx="12" class="button"/>
      <text x="232" y="366" text-anchor="middle" class="caption">Закрыть</text>
      <rect x="304" y="342" width="108" height="38" rx="12" fill="#fff5f5" stroke="#fecaca"/>
      <text x="358" y="366" text-anchor="middle" font-size="14" fill="#b91c1c">Выход</text>
    </g>

    <!-- Dark theme -->
    <text x="56" y="632" class="h2">Dark theme</text>
    <g transform="translate(56 660)" filter="url(#shadow)">
      <rect x="0" y="0" width="480" height="180" rx="24" fill="#111827"/>
      <rect x="22" y="20" width="436" height="50" rx="17" fill="#1f2937"/>
      <text x="40" y="52" class="darkH2">История буфера</text>
      <rect x="358" y="30" width="72" height="24" rx="12" fill="#263244"/>
      <text x="394" y="47" text-anchor="middle" font-size="13" fill="#93c5fd">5 / 20</text>
      <g transform="translate(32 92)">
        <rect x="0" y="0" width="416" height="50" rx="15" fill="#263244" stroke="#3b82f6"/>
        <rect x="12" y="13" width="30" height="24" rx="12" fill="#3b82f6"/>
        <text x="27" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1</text>
        <text x="56" y="31" class="darkBody">31.56.205.85</text>
      </g>
    </g>

    <g transform="translate(574 660)" filter="url(#shadow)">
      <rect x="0" y="0" width="500" height="180" rx="24" fill="#111827"/>
      <rect x="24" y="22" width="206" height="136" rx="18" fill="#1f2937"/>
      <text x="46" y="56" class="darkH3">Shortcut</text>
      <rect x="46" y="76" width="160" height="34" rx="10" fill="#111827" stroke="#374151"/>
      <text x="60" y="98" font-size="14" fill="#e5e7eb">Ctrl+Shift+Win</text>
      <rect x="46" y="120" width="118" height="32" rx="10" fill="#3b82f6"/>
      <text x="105" y="141" text-anchor="middle" font-size="14" font-weight="600" fill="#fff">Apply</text>

      <rect x="250" y="22" width="226" height="136" rx="18" fill="#1f2937"/>
      <circle cx="278" cy="60" r="12" fill="#22c55e"/>
      <path d="M272 60 l5 5 l10 -12" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="302" y="66" class="darkBody">Auto paste</text>
      <text x="278" y="104" class="darkSmall">ЛКМ: история</text>
      <text x="278" y="128" class="darkSmall">ПКМ: настройки</text>
    </g>

    <!-- Selected icon -->
    <g transform="translate(1110 166)" filter="url(#softShadow)">
      <rect x="0" y="0" width="130" height="130" rx="30" fill="#e7f1ff"/>
      <rect x="42" y="30" width="56" height="74" rx="12" fill="#fff" stroke="#0b5cad" stroke-width="5"/>
      <rect x="54" y="22" width="32" height="18" rx="8" fill="url(#blue)"/>
      <path d="M52 58 h36 M52 74 h28 M52 90 h22" stroke="#0b5cad" stroke-width="5" stroke-linecap="round"/>
      <text x="65" y="164" text-anchor="middle" class="small">Selected icon</text>
    </g>

    <g transform="translate(1110 370)" filter="url(#softShadow)">
      <rect x="0" y="0" width="130" height="130" rx="30" fill="#111827"/>
      <rect x="42" y="30" width="56" height="74" rx="12" fill="#f8fafc" stroke="#60a5fa" stroke-width="5"/>
      <rect x="54" y="22" width="32" height="18" rx="8" fill="#3b82f6"/>
      <path d="M52 58 h36 M52 74 h28 M52 90 h22" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
      <text x="65" y="164" text-anchor="middle" class="small">Dark tray</text>
    </g>
  </g>
</svg>
