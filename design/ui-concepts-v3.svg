<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1040" viewBox="0 0 1280 1040">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f8fb"/>
      <stop offset="1" stop-color="#edf3fa"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f7de1"/>
      <stop offset="1" stop-color="#0b5cad"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="148%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#172033" flood-opacity="0.16"/>
    </filter>
    <filter id="softShadow" x="-18%" y="-18%" width="136%" height="148%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#172033" flood-opacity="0.11"/>
    </filter>
    <style>
      .root { font-family: "Segoe UI", Arial, sans-serif; }
      .h1 { font-size: 32px; font-weight: 700; fill: #0f172a; }
      .h2 { font-size: 24px; font-weight: 700; fill: #0f172a; }
      .historyTitle { font-size: 22px; font-weight: 700; fill: #0f172a; }
      .h3 { font-size: 17px; font-weight: 700; fill: #0f172a; }
      .body { font-size: 16px; fill: #334155; }
      .small { font-size: 13px; fill: #64748b; }
      .tiny { font-size: 11px; fill: #64748b; }
      .caption { font-size: 14px; fill: #475569; }
      .panel { fill: #ffffff; stroke: #d8e1ec; stroke-width: 1; }
      .line { stroke: #e2e8f0; stroke-width: 1; }
      .button { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .darkHistoryTitle { font-size: 22px; font-weight: 700; fill: #f8fafc; }
      .darkH2 { font-size: 24px; font-weight: 700; fill: #f8fafc; }
      .darkH3 { font-size: 17px; font-weight: 700; fill: #f8fafc; }
      .darkBody { font-size: 16px; fill: #e5e7eb; }
      .darkSmall { font-size: 13px; fill: #9ca3af; }
      .darkTiny { font-size: 11px; fill: #9ca3af; }
    </style>
  </defs>

  <rect width="1280" height="1040" fill="url(#pageBg)"/>
  <g class="root">
    <text x="56" y="58" class="h1">Selected direction v3</text>
    <text x="56" y="86" class="caption">Единый layout для светлой и темной темы. Активная запись того же размера. Заголовок истории -2 px. Паддинги записей еще -2 px. Добавлены переключатель темы и автозапуск.</text>

    <!-- Light theme -->
    <text x="56" y="138" class="h2">Light theme</text>
    <g transform="translate(56 166)" filter="url(#shadow)">
      <rect x="0" y="0" width="480" height="252" rx="24" class="panel"/>
      <rect x="22" y="20" width="436" height="54" rx="18" fill="#f8fbff"/>
      <text x="40" y="52" class="historyTitle">История буфера</text>
      <path d="M438 30 l12 12 M450 30 l-12 12" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
      <text x="40" y="90" class="small">Ctrl+Shift+Win</text>
      <line x1="40" y1="110" x2="438" y2="110" class="line"/>

      <!-- List items: same height, item padding 2px tighter than v2 -->
      <g transform="translate(30 126)">
        <rect x="0" y="0" width="420" height="42" rx="15" fill="#f7fbff" stroke="#93c5fd"/>
        <rect x="10" y="9" width="30" height="24" rx="12" fill="url(#blue)"/>
        <text x="25" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1</text>
        <text x="52" y="27" class="body">31.56.205.85</text>
        <path d="M396 15 l8 8 M404 15 l-8 8" stroke="#be123c" stroke-width="2" stroke-linecap="round"/>
      </g>
      <g transform="translate(30 172)">
        <rect x="0" y="0" width="420" height="42" rx="15" fill="#fff" stroke="#e2e8f0"/>
        <rect x="10" y="10" width="30" height="22" rx="11" fill="#e7f1ff"/>
        <text x="25" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#0b5cad">2</text>
        <text x="52" y="27" class="caption">Вставить выбранную запись...</text>
        <path d="M396 15 l8 8 M404 15 l-8 8" stroke="#be123c" stroke-width="2" stroke-linecap="round"/>
      </g>
    </g>

    <g transform="translate(574 166)" filter="url(#shadow)">
      <rect x="0" y="0" width="500" height="456" rx="24" class="panel"/>
      <rect x="24" y="22" width="452" height="70" rx="18" fill="#f8fbff" stroke="#e2e8f0"/>
      <text x="46" y="54" class="h2">Extended Clipboard</text>
      <text x="46" y="78" class="small">Записей в истории: 5 / 20</text>

      <rect x="24" y="112" width="452" height="124" rx="18" fill="#fff" stroke="#e2e8f0"/>
      <text x="46" y="144" class="h3">Комбинация для истории</text>
      <rect x="46" y="160" width="214" height="38" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="62" y="184" class="body">Ctrl+Shift+Win</text>
      <rect x="278" y="160" width="120" height="38" rx="12" fill="#0b5cad"/>
      <text x="338" y="184" text-anchor="middle" font-size="15" font-weight="600" fill="#fff">Применить</text>
      <text x="46" y="218" class="tiny">ЛКМ по значку: история. ПКМ: настройки.</text>

      <rect x="24" y="256" width="452" height="118" rx="18" fill="#fff" stroke="#e2e8f0"/>
      <rect x="46" y="276" width="22" height="22" rx="6" fill="#0b5cad"/>
      <path d="M52 287 l4 4 l8 -10" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="82" y="293" class="body">Вставлять выбранную запись автоматически</text>

      <rect x="46" y="310" width="22" height="22" rx="6" fill="#fff" stroke="#cbd5e1"/>
      <text x="82" y="327" class="body">Запускаться вместе с системой</text>

      <text x="46" y="361" class="body">Тема интерфейса</text>
      <rect x="228" y="338" width="218" height="36" rx="18" fill="#eef4fb" stroke="#cbd5e1"/>
      <rect x="232" y="342" width="105" height="28" rx="14" fill="#fff" stroke="#d8e1ec"/>
      <circle cx="258" cy="356" r="8" fill="#fde68a"/>
      <text x="280" y="361" font-size="13" font-weight="600" fill="#0f172a">Светлая</text>
      <circle cx="356" cy="356" r="8" fill="#334155"/>
      <circle cx="360" cy="353" r="8" fill="#eef4fb"/>
      <text x="378" y="361" font-size="13" fill="#64748b">Темная</text>

      <rect x="24" y="398" width="136" height="38" rx="12" class="button"/>
      <text x="92" y="422" text-anchor="middle" class="caption">Очистить</text>
      <rect x="178" y="398" width="108" height="38" rx="12" class="button"/>
      <text x="232" y="422" text-anchor="middle" class="caption">Закрыть</text>
      <rect x="304" y="398" width="108" height="38" rx="12" fill="#fff5f5" stroke="#fecaca"/>
      <text x="358" y="422" text-anchor="middle" font-size="14" fill="#b91c1c">Выход</text>
    </g>

    <!-- Dark theme: exact same layout, colors from dark option -->
    <text x="56" y="690" class="h2">Dark theme</text>
    <g transform="translate(56 718)" filter="url(#shadow)">
      <rect x="0" y="0" width="480" height="252" rx="24" fill="#111827"/>
      <rect x="22" y="20" width="436" height="54" rx="18" fill="#1f2937"/>
      <text x="40" y="52" class="darkHistoryTitle">История буфера</text>
      <path d="M438 30 l12 12 M450 30 l-12 12" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
      <text x="40" y="90" class="darkSmall">Ctrl+Shift+Win</text>
      <line x1="40" y1="110" x2="438" y2="110" stroke="#374151" stroke-width="1"/>

      <g transform="translate(30 126)">
        <rect x="0" y="0" width="420" height="42" rx="15" fill="#263244" stroke="#3b82f6"/>
        <rect x="10" y="9" width="30" height="24" rx="12" fill="#3b82f6"/>
        <text x="25" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1</text>
        <text x="52" y="27" class="darkBody">31.56.205.85</text>
        <path d="M396 15 l8 8 M404 15 l-8 8" stroke="#fca5a5" stroke-width="2" stroke-linecap="round"/>
      </g>
      <g transform="translate(30 172)">
        <rect x="0" y="0" width="420" height="42" rx="15" fill="#172033" stroke="#374151"/>
        <rect x="10" y="10" width="30" height="22" rx="11" fill="#1f3b5f"/>
        <text x="25" y="26" text-anchor="middle" font-size="11" font-weight="700" fill="#93c5fd">2</text>
        <text x="52" y="27" font-size="14" fill="#cbd5e1">Вставить выбранную запись...</text>
        <path d="M396 15 l8 8 M404 15 l-8 8" stroke="#fca5a5" stroke-width="2" stroke-linecap="round"/>
      </g>
    </g>

    <g transform="translate(574 718)" filter="url(#shadow)">
      <rect x="0" y="0" width="500" height="456" rx="24" fill="#111827"/>
      <rect x="24" y="22" width="452" height="70" rx="18" fill="#1f2937"/>
      <text x="46" y="54" class="darkH2">Extended Clipboard</text>
      <text x="46" y="78" class="darkSmall">Записей в истории: 5 / 20</text>

      <rect x="24" y="112" width="452" height="124" rx="18" fill="#1f2937"/>
      <text x="46" y="144" class="darkH3">Комбинация для истории</text>
      <rect x="46" y="160" width="214" height="38" rx="12" fill="#111827" stroke="#374151"/>
      <text x="62" y="184" class="darkBody">Ctrl+Shift+Win</text>
      <rect x="278" y="160" width="120" height="38" rx="12" fill="#3b82f6"/>
      <text x="338" y="184" text-anchor="middle" font-size="15" font-weight="600" fill="#fff">Применить</text>
      <text x="46" y="218" class="darkTiny">ЛКМ по значку: история. ПКМ: настройки.</text>

      <rect x="24" y="256" width="452" height="118" rx="18" fill="#1f2937"/>
      <rect x="46" y="276" width="22" height="22" rx="6" fill="#22c55e"/>
      <path d="M52 287 l4 4 l8 -10" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="82" y="293" class="darkBody">Вставлять выбранную запись автоматически</text>

      <rect x="46" y="310" width="22" height="22" rx="6" fill="#111827" stroke="#374151"/>
      <text x="82" y="327" class="darkBody">Запускаться вместе с системой</text>

      <text x="46" y="361" class="darkBody">Тема интерфейса</text>
      <rect x="228" y="338" width="218" height="36" rx="18" fill="#111827" stroke="#374151"/>
      <circle cx="258" cy="356" r="8" fill="#fde68a"/>
      <text x="280" y="361" font-size="13" fill="#9ca3af">Светлая</text>
      <rect x="337" y="342" width="105" height="28" rx="14" fill="#3b82f6"/>
      <circle cx="363" cy="356" r="8" fill="#f8fafc"/>
      <circle cx="367" cy="353" r="8" fill="#3b82f6"/>
      <text x="385" y="361" font-size="13" font-weight="600" fill="#fff">Темная</text>

      <rect x="24" y="398" width="136" height="38" rx="12" fill="#1f2937" stroke="#374151"/>
      <text x="92" y="422" text-anchor="middle" font-size="14" fill="#d1d5db">Очистить</text>
      <rect x="178" y="398" width="108" height="38" rx="12" fill="#1f2937" stroke="#374151"/>
      <text x="232" y="422" text-anchor="middle" font-size="14" fill="#d1d5db">Закрыть</text>
      <rect x="304" y="398" width="108" height="38" rx="12" fill="#7f1d1d"/>
      <text x="358" y="422" text-anchor="middle" font-size="14" fill="#fee2e2">Выход</text>
    </g>

    <!-- Selected icon -->
    <g transform="translate(1110 166)" filter="url(#softShadow)">
      <rect x="0" y="0" width="130" height="130" rx="30" fill="#e7f1ff"/>
      <rect x="42" y="30" width="56" height="74" rx="12" fill="#fff" stroke="#0b5cad" stroke-width="5"/>
      <rect x="54" y="22" width="32" height="18" rx="8" fill="url(#blue)"/>
      <path d="M52 58 h36 M52 74 h28 M52 90 h22" stroke="#0b5cad" stroke-width="5" stroke-linecap="round"/>
      <text x="65" y="164" text-anchor="middle" class="small">Selected icon</text>
    </g>

    <g transform="translate(1110 370)" filter="url(#softShadow)">
      <rect x="0" y="0" width="130" height="130" rx="30" fill="#111827"/>
      <rect x="42" y="30" width="56" height="74" rx="12" fill="#f8fafc" stroke="#60a5fa" stroke-width="5"/>
      <rect x="54" y="22" width="32" height="18" rx="8" fill="#3b82f6"/>
      <path d="M52 58 h36 M52 74 h28 M52 90 h22" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
      <text x="65" y="164" text-anchor="middle" class="small">Dark tray</text>
    </g>
  </g>
</svg>
